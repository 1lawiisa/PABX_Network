<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ช่างศรารักษ์บริการไฟฟ้าสื่อสาร และเน็ตเวิร์กครบวงจร</title>
    <link rel="stylesheet" href="style/style-service-2.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="header">
      <h1>บริการงานระบบไฟฟ้าสื่อสาร และเน็ตเวิร์กครบวงจร</h1>
    </div>

    <div class="main-content">
      <!-- service -->
      <div class="service-area">
        <p>
          พื้นที่ให้บริการ: กรุงเทพฯ ปริมณฑล และ
          <span>"รับงานติดตั้งทั่วประเทศ"</span>
        </p>
      </div>

      <!-- menu -->
      <div class="nav-menu">
        <a href="index.html">รายการแนะนำ</a>
        <a href="service-2.html">บริการต่างๆ</a>
        <a href="Abtme_contact.html">ช่องทางติดต่อ</a>
      </div>
    </div>

    <div class="services-content">
      <div class="accordion-item">
        <button class="accordion-header">
          <span class="accordion-title">รับเดินสายกล้องวงจรปิด CCTV</span>
          <div class="arrow-icon"></div>
        </button>
        <div class="accordion-panel">
          <div class="image-gallery">
            <img
              src="/img/rabbit.png"
              alt="CCTV 1"
              class="gallery-img"
            />
            <img
              src="/img/rabbit.png"
              alt="CCTV 2"
              class="gallery-img"
            />
            <img
              src="/img/rabbit.png"
              alt="CCTV 3"
              class="gallery-img"
            />
          </div>
        </div>
      </div>

      <div class="accordion-item">
        <button class="accordion-header">
          <span class="accordion-title">รับเดินสาย Lan</span>
          <div class="arrow-icon"></div>
        </button>
        <div class="accordion-panel">
          <div class="image-gallery">
            <img
              src="https://images.unsplash.com/photo-1544256718-3bcf237f3974?w=300"
              alt="Lan 1"
              class="gallery-img"
            />
            <img
              src="https://images.unsplash.com/photo-1544256718-3bcf237f3974?w=300"
              alt="Lan 2"
              class="gallery-img"
            />
            <img
              src="https://images.unsplash.com/photo-1544256718-3bcf237f3974?w=300"
              alt="Lan 3"
              class="gallery-img"
            />
          </div>
        </div>
      </div>

      <div class="accordion-item">
        <button class="accordion-header">
          <span class="accordion-title">รับเดินสายไฟ</span>
          <div class="arrow-icon"></div>
        </button>
        <div class="accordion-panel">
          <div class="image-gallery">
            <img
              src="https://images.unsplash.com/photo-1621905251189-08b45d6a269e?w=300"
              alt="Electric 1"
              class="gallery-img"
            />
            <img
              src="https://images.unsplash.com/photo-1621905251189-08b45d6a269e?w=300"
              alt="Electric 2"
              class="gallery-img"
            />
            <img
              src="https://images.unsplash.com/photo-1621905251189-08b45d6a269e?w=300"
              alt="Electric 3"
              class="gallery-img"
            />
          </div>
        </div>
      </div>

      <div class="accordion-item">
        <button class="accordion-header">
          <span class="accordion-title">รับเดินสายโทรศัพท์</span>
          <div class="arrow-icon"></div>
        </button>
        <div class="accordion-panel">
          <div class="image-gallery">
            <img
              src="https://images.unsplash.com/photo-1523966211575-f2635a8e961f?w=300"
              alt="Phone 1"
              class="gallery-img"
            />
            <img
              src="https://images.unsplash.com/photo-1523966211575-f2635a8e961f?w=300"
              alt="Phone 2"
              class="gallery-img"
            />
            <img
              src="https://images.unsplash.com/photo-1523966211575-f2635a8e961f?w=300"
              alt="Phone 3"
              class="gallery-img"
            />
          </div>
        </div>
      </div>

      <div class="accordion-item">
        <button class="accordion-header">
          <span class="accordion-title"
            >บริการติดตั้งซ่อม หรือย้าย ระบบตู้สาขาโทรศัพท์ภายในบ้าน
            และสำนักงาน</span
          >
          <div class="arrow-icon"></div>
        </button>
        <div class="accordion-panel">
          <div class="image-gallery">
            <img
              src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?w=300"
              alt="Office 1"
              class="gallery-img"
            />
            <img
              src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?w=300"
              alt="Office 2"
              class="gallery-img"
            />
            <img
              src="https://images.unsplash.com/photo-1551836022-d5d88e9218df?w=300"
              alt="Office 3"
              class="gallery-img"
            />
          </div>
        </div>
      </div>
    </div>

    <script src="/JS/serivces.js"></script>
  </body>
</html>
